name: Tag and Release from Cargo.toml

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to push tags and create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # required to push tags

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        uses: katyo/publish-crates@v2
        id: publish
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          check-repo: false

      - name: Create Git tags for published crates
        id: tags
        if: fromJSON(steps.publish.outputs.published).*
        run: |
          echo '${{ steps.publish.outputs.published }}' \
            | jq -r '.[] | "\(.name)/v\(.version)"' \
            | while read TAG; do
                git tag "$TAG"
                git push origin "$TAG"
              done

          DEBUGBRIDGE_NEW=$(echo '${{ steps.publish.outputs.published }}' \
            | jq 'any(.[]; .name == "xvc-server-debugbridge")')
          echo "debugbridge_new=$DEBUGBRIDGE_NEW" >> $GITHUB_OUTPUT

      - name: Build binary
        if: steps.tags.outputs.debugbridge_new == 'true'
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          args: '--release --locked'
          target: aarch64-unknown-linux-gnu
          toolchain: stable

      - name: Publish artifacts and release
        if: steps.tags.outputs.debugbridge_new == 'true'
        uses: houseabsolute/actions-rust-release@v0
        with:
          executable-name: xvc-bridge
          target: aarch64-unknown-linux-gnu
          release-tag-prefix: "xvc-server-debugbridge/v"
          changes-file: "" # No changelog file
